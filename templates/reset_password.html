{% extends "base.html" %}
{% block title %}Reset Password - AI Resume Pro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <div class="lock-icon">🔑</div>
            <h1>Set New Password</h1>
            <p>Enter your new password below</p>
        </div>

        <form action="{{ url_for('auth.reset_password', token=token) }}" method="POST" class="auth-form">
            <div class="input-group">
                <label>New Password</label>
                <div class="pass-wrap">
                    <input type="password" id="password" name="password" placeholder="Min. 6 characters" required>
                    <button type="button" onclick="toggle('password','e1')"><span id="e1">👁️</span></button>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <div class="pass-wrap">
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                    <button type="button" onclick="toggle('confirm_password','e2')"><span id="e2">👁️</span></button>
                </div>
            </div>

            <div id="matchMsg" class="match-msg" style="display:none;"></div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Reset Password ✅
            </button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('auth.login') }}">← Back to Login</a>
        </div>
    </div>
</div>

<script>
function toggle(inputId, iconId) {
    var inp = document.getElementById(inputId);
    var ico = document.getElementById(iconId);
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.textContent = inp.type === 'password' ? '👁️' : '🙈';
}

document.getElementById('confirm_password').addEventListener('input', function() {
    var p1  = document.getElementById('password').value;
    var p2  = this.value;
    var msg = document.getElementById('matchMsg');
    var btn = document.getElementById('submitBtn');
    if (p2.length === 0) { msg.style.display = 'none'; return; }
    msg.style.display = 'block';
    if (p1 === p2) {
        msg.className = 'match-msg success'; msg.textContent = '✅ Passwords match!';
        btn.disabled = false;
    } else {
        msg.className = 'match-msg error'; msg.textContent = '❌ Passwords do not match';
        btn.disabled = true;
    }
});
</script>

<style>
.auth-container {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
}
.auth-box {
    background: white;
    border-radius: 24px;
    padding: 50px 45px;
    width: 100%; max-width: 430px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    animation: popIn 0.4s ease;
}
.auth-header { text-align: center; margin-bottom: 35px; }
.lock-icon { font-size: 3.5em; margin-bottom: 15px; }
.auth-header h1 { font-size: 1.9em; color: #333; margin-bottom: 8px; }
.auth-header p  { color: #888; font-size: 0.95em; }

.input-group { margin-bottom: 22px; }
.input-group label {
    display: block; margin-bottom: 8px;
    color: #444; font-weight: 600; font-size: 0.9em;
}
.pass-wrap { position: relative; }
.pass-wrap input {
    width: 100%; padding: 14px 48px 14px 16px;
    border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 1em; color: #333; transition: border-color 0.3s;
}
.pass-wrap input:focus { outline: none; border-color: #667eea; }
.pass-wrap button {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 1.2em;
}

.match-msg {
    padding: 10px 14px; border-radius: 8px;
    font-size: 0.9em; font-weight: 600; margin-bottom: 15px;
}
.match-msg.success { background: #e8f5e9; color: #2e7d32; }
.match-msg.error   { background: #fdecea; color: #c62828; }

.btn-submit {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 12px;
    font-size: 1.05em; font-weight: 700; cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(102,126,234,0.4);
}
.btn-submit:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(102,126,234,0.5);
}
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

.back-link { text-align: center; margin-top: 25px; }
.back-link a { color: #667eea; text-decoration: none; font-weight: 600; font-size: 0.95em; }
.back-link a:hover { text-decoration: underline; }

@keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
}
</style>
{% endblock %}
